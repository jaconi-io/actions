name: Setup flux-envsubst
description: A GitHub Action for installing flux-envsubst.
author: jaconi GmbH
branding:
  color: gray-dark
  icon: terminal
inputs:
  version:
    description: flux-envsubst version to install. Defaults to the latest release.
    required: false
runs:
  using: composite
  steps:
    - name: Download the binary to the runners cache dir
      shell: bash
      run: |
        VERSION=${{ inputs.version }}
        if [[ -z "$VERSION" ]] || [[ "$VERSION" == "latest" ]]; then
          VERSION=$(curl -fsSL -H "Authorization: token ${{github.token}}" https://api.github.com/repos/jaconi-io/flux-envsubst/releases/latest | grep tag_name | cut -d '"' -f 4)
        fi
        if [[ -z "$VERSION" ]]; then
          echo "Unable to determine flux-envsubst version"
        exit 1
        fi
        if [[ ! $VERSION = v* ]]; then
          VERSION="v${VERSION}"
        fi

        OS=$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')
        if [[ "$OS" == "macos" ]]; then
          OS="darwin"
        fi

        ARCH=$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')
        if [[ "$ARCH" == "x64" ]]; then
          ARCH="amd64"
        elif [[ "$ARCH" == "x86" ]]; then
          ARCH="386"
        fi

        FLUX_ENVSUBST_EXEC_FILE="flux-envsubst"
        if [[ "$OS" == "windows" ]]; then
            FLUX_ENVSUBST_EXEC_FILE="${FLUX_ENVSUBST_EXEC_FILE}.exe"
        fi

        FLUX_ENVSUBST_TOOL_DIR="${RUNNER_TOOL_CACHE}/flux-envsubst/${VERSION}/${OS}/${ARCH}"
        if [[ ! -x "$FLUX_ENVSUBST_TOOL_DIR/$FLUX_ENVSUBST_EXEC_FILE" ]]; then
          DL_DIR="$(mktemp -dt flux-envsubst-XXXXXX)"
          trap 'rm -rf $DL_DIR' EXIT

          echo "Downloading flux-envsubst ${VERSION} for ${OS}/${ARCH}"
          FLUX_ENVSUBST_TARGET_FILE="flux-envsubst_${VERSION#v}_${OS}_${ARCH}.tar.gz"
          if [[ "$OS" == "windows" ]]; then
            FLUX_ENVSUBST_TARGET_FILE="flux-envsubst_${VERSION#v}_${OS}_${ARCH}.zip"
          fi

          FLUX_ENVSUBST_CHECKSUMS_FILE="checksums.txt"

          FLUX_ENVSUBST_DOWNLOAD_URL="https://github.com/jaconi-io/flux-envsubst/releases/download/${VERSION}/"

          curl -fsSL -o "$DL_DIR/$FLUX_ENVSUBST_TARGET_FILE" "$FLUX_ENVSUBST_DOWNLOAD_URL/$FLUX_ENVSUBST_TARGET_FILE"
          curl -fsSL -o "$DL_DIR/$FLUX_ENVSUBST_CHECKSUMS_FILE" "$FLUX_ENVSUBST_DOWNLOAD_URL/$FLUX_ENVSUBST_CHECKSUMS_FILE"

          echo "Verifying checksum"
          sum=$(openssl sha1 -sha256 "$DL_DIR/$FLUX_ENVSUBST_TARGET_FILE" | awk '{print $2}')
          expected_sum=$(grep " $FLUX_ENVSUBST_TARGET_FILE\$" "$DL_DIR/$FLUX_ENVSUBST_CHECKSUMS_FILE" | awk '{print $1}')
          if [ "$sum" != "$expected_sum" ]; then
            echo "SHA sum of ${FLUX_ENVSUBST_TARGET_FILE} does not match. Aborting."
            exit 1
          fi

          echo "Installing flux-envsubst to ${FLUX_ENVSUBST_TOOL_DIR}"
          mkdir -p "$FLUX_ENVSUBST_TOOL_DIR"

          if [[ "$OS" == "windows" ]]; then
            unzip "$DL_DIR/$FLUX_ENVSUBST_TARGET_FILE" "$FLUX_ENVSUBST_EXEC_FILE" -d "$FLUX_ENVSUBST_TOOL_DIR"
          else
            tar xzf "$DL_DIR/$FLUX_ENVSUBST_TARGET_FILE" -C "$FLUX_ENVSUBST_TOOL_DIR" "$FLUX_ENVSUBST_EXEC_FILE"
          fi

          chmod +x "$FLUX_ENVSUBST_TOOL_DIR/$FLUX_ENVSUBST_EXEC_FILE"
        fi

        echo "Adding flux-envsubst to path"
        echo "$FLUX_ENVSUBST_TOOL_DIR" >> "$GITHUB_PATH"

    - name: Print installed flux-envsubst help
      shell: bash
      run: |
        flux-envsubst --help
